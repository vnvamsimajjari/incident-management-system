<!DOCTYPE html>
<html>
<head>
    <title>Create Incident</title>

    <!-- ✅ Correct CSS path -->
    <link rel="stylesheet" href="../css/main.css">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .form-box {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #185FA5;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0C447C;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>Create Incident</h2>

<div class="form-box">

    <form id="incidentForm">

        <label>Title:</label>
        <input type="text" id="title" required>

        <label>Description:</label>
        <textarea id="description"></textarea>

        <label>Priority:</label>
        <select id="priority">
            <option value="LOW">LOW</option>
            <option value="MEDIUM">MEDIUM</option>
            <option value="HIGH">HIGH</option>
        </select>

        <label>Assign To:</label>
        <select id="assignedTo">
            <option value="admin">admin</option>
            <option value="engineer">engineer</option>
        </select>

        <label>SLA Minutes:</label>
        <input type="number" id="slaMinutes" value="60">

        <button type="submit">Create</button>

    </form>

    <a class="back-link" href="incidents.html">Back to Incidents</a>

</div>

<!-- ✅ Correct JS path -->
<script src="../js/create-incident.js"></script>

</body>
</html>
