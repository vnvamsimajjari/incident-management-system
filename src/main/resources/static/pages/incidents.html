<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Incidents</title>

    <!-- ✅ Correct CSS path -->
    <link rel="stylesheet" href="../css/main.css">

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f6f8;
        }

        h2 {
            text-align: center;
        }

        table {
            background: white;
            border-collapse: collapse;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        th {
            background: #185FA5;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<h2>All Incidents</h2>

<div class="top-bar">
    <button onclick="logout()">Logout</button>
    <a href="create-incident.html">Create Incident</a>
</div>

<table border="1" width="100%">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Assigned To</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody id="incidentsTable">
    <tr>
        <td colspan="6">Loading...</td>
    </tr>
    </tbody>
</table>

<!-- ✅ Correct JS path -->
<script src="../js/incidents.js"></script>

<script>
    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/pages/login.html";
    }
</script>

</body>
</html>
