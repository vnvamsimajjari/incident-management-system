<!DOCTYPE html>
<html>
<head>
    <title>View Incidents</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body onload="initPage()">

<h2>All Incidents</h2>

<button onclick="logout()">Logout</button>
<br><br>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Priority</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody id="incidentTable"></tbody>
</table>

<p id="emptyMessage" style="display:none;">No incidents found</p>

<br>
<a href="create-incident.html">Create Incident</a>

<script src="../js/api.js"></script>
<script src="../js/app.js"></script>

<script>
    // INIT PAGE
    function initPage() {
        const token = localStorage.getItem("token");

        // Example 1: No token → redirect
        if (!token) {
            alert("Please login first");
            window.location.href = "login.html";
            return;
        }

        loadIncidents();
    }


    // LOAD INCIDENTS
    async function loadIncidents() {
        try {
            const data = await getIncidents();

            const table = document.getElementById("incidentTable");
            const emptyMsg = document.getElementById("emptyMessage");

            table.innerHTML = "";

            // Example 2: Empty list
            if (!data || data.length === 0 || data.content?.length === 0) {
                emptyMsg.style.display = "block";
                return;
            }

            const incidents = data.content || data;

            incidents.forEach(inc => {
                const row = `
                    <tr>
                        <td>${inc.id}</td>
                        <td>${inc.title}</td>
                        <td>${inc.priority}</td>
                        <td>${inc.status}</td>
                    </tr>
                `;

                table.innerHTML += row;
            });

        } catch (error) {
            console.error(error);
            alert("Failed to load incidents");
        }
    }


    // LOGOUT
    function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
