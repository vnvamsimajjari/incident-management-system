<!DOCTYPE html>
<html>
<head>
    <title>View Incidents</title>

    <!-- ✅ FIXED PATH -->
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body onload="initPage()">

<h2>All Incidents</h2>

<button onclick="logout()">Logout</button>
<br><br>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody id="incidentTable"></tbody>
</table>

<p id="emptyMessage" style="display:none;">No incidents found</p>

<br>
<a href="/pages/create-incident.html">Create Incident</a>

<!-- ✅ FIXED PATH -->
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>

<script>
    function initPage() {
        const token = localStorage.getItem("token");

        if (!token) {
            alert("Please login first");
            window.location.href = "/pages/login.html";
            return;
        }

        loadIncidents();
    }

    async function loadIncidents() {
        try {
            const data = await getIncidents();

            const table = document.getElementById("incidentTable");
            const emptyMsg = document.getElementById("emptyMessage");

            table.innerHTML = "";
            emptyMsg.style.display = "none";

            const incidents = data.content || data;

            if (!incidents || incidents.length === 0) {
                emptyMsg.style.display = "block";
                return;
            }

            incidents.forEach(inc => {
                const row = `
                    <tr>
                        <td>${inc.id}</td>
                        <td>${inc.title}</td>
                        <td>${inc.priority}</td>
                        <td>${inc.status}</td>
                        <td>
                            <button onclick="updateStatus(${inc.id})">Update</button>
                        </td>
                    </tr>
                `;
                table.innerHTML += row;
            });

        } catch (error) {
            console.error(error);
            alert("Failed to load incidents");
        }
    }

    // ✅ UPDATE STATUS ONLY
    async function updateStatus(id) {
        const status = prompt("Enter status: OPEN / IN_PROGRESS / CLOSED");

        if (!status) return;

        try {
            await fetch(`/api/incidents/${id}/status`, {
                method: "PUT",
                headers: getAuthHeaders(),
                body: JSON.stringify({ status })
            });

            alert("Updated successfully");
            loadIncidents();

        } catch (e) {
            console.error(e);
            alert("Update failed");
        }
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/pages/login.html";
    }
</script>

</body>
</html>
