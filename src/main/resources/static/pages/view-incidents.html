<!DOCTYPE html>
<html>
<head>
    <title>View Incidents</title>

    <!-- ✅ FIXED PATH -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body onload="initPage()">

<h2>All Incidents</h2>

<button onclick="logout()">Logout</button>
<br><br>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Priority</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody id="incidentTable"></tbody>
</table>

<p id="emptyMessage" style="display:none;">No incidents found</p>

<br>
<a href="/pages/create-incident.html">Create Incident</a>

<!-- ✅ FIXED PATH -->
<script src="/assets/js/api.js"></script>
<script src="/assets/js/app.js"></script>

<script>
    function initPage() {
        const token = localStorage.getItem("token");

        // 🔒 No token → redirect
        if (!token) {
            alert("Please login first");
            window.location.href = "/pages/login.html";
            return;
        }

        loadIncidents();
    }

    async function loadIncidents() {
        try {
            const data = await getIncidents();

            const table = document.getElementById("incidentTable");
            const emptyMsg = document.getElementById("emptyMessage");

            table.innerHTML = "";
            emptyMsg.style.display = "none";

            const incidents = data.content || data;

            // ✅ Empty check
            if (!incidents || incidents.length === 0) {
                emptyMsg.style.display = "block";
                return;
            }

            incidents.forEach(inc => {
                const row = `
                    <tr>
                        <td>${inc.id}</td>
                        <td>${inc.title}</td>
                        <td>${inc.priority}</td>
                        <td>${inc.status}</td>
                    </tr>
                `;
                table.innerHTML += row;
            });

        } catch (error) {
            console.error(error);
            alert("Failed to load incidents");
        }
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "/pages/login.html";
    }
</script>

</body>
</html>
